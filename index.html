<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Malla Ingeniería Comercial</title>

<style>
body{
font-family:'Segoe UI', sans-serif;
background:#f8f7ff;
padding:20px;
}

h1{
text-align:center;
color:#2D2A63;
}

.progressBox{
max-width:600px;
margin:auto;
margin-bottom:20px;
}

.bar{
height:18px;
background:#E5E3F2;
border-radius:20px;
overflow:hidden;
}

.barFill{
height:100%;
background:#6C5CE7;
width:0%;
transition:0.4s;
}

.grid{
display:flex;
gap:18px;
overflow-x:auto;
}

.semestre{
background:#fff;
padding:10px;
border-radius:14px;
min-width:240px;
box-shadow:0 6px 12px rgba(0,0,0,0.08);
}

.semestre h2{
text-align:center;
color:#6C5CE7;
}

.ramo{
background:#FADADD;
margin:6px 0;
padding:8px;
border-radius:8px;
cursor:pointer;
position:relative;
}

.ramo.aprobado{
background:#B39DFF;
text-decoration:line-through;
}

.ramo.bloqueado{
background:#E5E3F2;
cursor:not-allowed;
}

.req{
font-size:11px;
opacity:0.7;
}
button{
display:block;
margin:15px auto;
padding:6px 12px;
border:none;
border-radius:8px;
background:#6C5CE7;
color:white;
}
</style>
</head>

<body>

<h1>Malla Ingeniería Comercial</h1>

<div class="progressBox">
<div id="textoProgreso"></div>
<div class="bar"><div class="barFill" id="barra"></div></div>
</div>

<button onclick="resetear()">Resetear progreso</button>

<div class="grid" id="malla"></div>

<script>

// 👉 TU MALLA (puedes agregar más ramos)
const malla={
"1° Semestre":[
{id:"introEco", nombre:"Introducción a la Economía"},
{id:"mate1", nombre:"Métodos Matemáticos I"}
],
"2° Semestre":[
{id:"micro", nombre:"Intro Microeconomía", req:["introEco"]},
{id:"mate2", nombre:"Métodos Matemáticos II", req:["mate1"]}
]
};

let aprobados=JSON.parse(localStorage.getItem("aprobados"))||[];

function nombre(id){
for(let s in malla)
for(let r of malla[s])
if(r.id===id) return r.nombre;
return id;
}

function progreso(){
let total=0;
for(let s in malla) total+=malla[s].length;
let p=aprobados.length;

document.getElementById("textoProgreso").innerText=
`Progreso: ${p} / ${total} ramos`;

document.getElementById("barra").style.width=
((p/total)*100)+"%";
}

function render(){
const cont=document.getElementById("malla");
cont.innerHTML="";

for(let sem in malla){
const col=document.createElement("div");
col.className="semestre";
col.innerHTML=`<h2>${sem}</h2>`;

malla[sem].forEach(r=>{
let faltan=r.req? r.req.filter(x=>!aprobados.includes(x)):[];
let bloqueado=faltan.length>0;

const div=document.createElement("div");
div.className="ramo";
if(bloqueado) div.classList.add("bloqueado");
if(aprobados.includes(r.id)) div.classList.add("aprobado");

div.innerHTML=
`${r.nombre}
${r.req?`<div class="req">Req: ${r.req.map(nombre).join(", ")}</div>`:""}
${bloqueado?`<div class="req">❌ Falta: ${faltan.map(nombre).join(", ")}</div>`:""}`;

div.onclick=()=>{
if(bloqueado) return;

if(aprobados.includes(r.id))
aprobados=aprobados.filter(x=>x!==r.id);
else
aprobados.push(r.id);

localStorage.setItem("aprobados",JSON.stringify(aprobados));
render();
progreso();
};

col.appendChild(div);
});

cont.appendChild(col);
}
}

function resetear(){
if(confirm("¿Seguro quieres borrar el progreso?")){
localStorage.removeItem("aprobados");
aprobados=[];
render();
progreso();
}
}

render();
progreso();

</script>

</body>
</html>
