<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Malla Ingeniería Comercial - Economía FEN</title>

<style>
body{
font-family:'Segoe UI', sans-serif;
background:#f8f7ff;
padding:20px;
}

h1{
text-align:center;
color:#2D2A63;
margin-bottom:10px;
}

.progressContainer{
max-width:700px;
margin:auto;
margin-bottom:20px;
}

.progressLabel{
font-size:14px;
margin-bottom:4px;
}

.bar{
height:18px;
background:#E5E3F2;
border-radius:20px;
overflow:hidden;
margin-bottom:10px;
}

.fill{
height:100%;
background:#6C5CE7;
width:0%;
transition:0.4s;
}

.grid{
display:flex;
gap:20px;
overflow-x:auto;
}

.semestre{
background:#fff;
padding:10px;
border-radius:14px;
min-width:260px;
box-shadow:0 6px 12px rgba(0,0,0,0.08);
}

.semestre h2{
text-align:center;
color:#6C5CE7;
}

.ramo{
background:#FADADD;
margin:6px 0;
padding:8px;
border-radius:8px;
cursor:pointer;
position:relative;
font-size:13px;
}

.ramo.aprobado{
background:#B39DFF;
text-decoration:line-through;
}

.ramo.bloqueado{
background:#E5E3F2;
cursor:not-allowed;
}

.req{
font-size:10px;
opacity:0.7;
}

button{
display:block;
margin:15px auto;
padding:6px 12px;
border:none;
border-radius:8px;
background:#6C5CE7;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Malla Ingeniería Comercial - Economía</h1>

<div class="progressContainer">
<div class="progressLabel" id="ramoTexto"></div>
<div class="bar"><div class="fill" id="ramoBar"></div></div>

<div class="progressLabel" id="creditTexto"></div>
<div class="bar"><div class="fill" id="creditBar"></div></div>
</div>

<button onclick="resetear()">Resetear progreso</button>

<div class="grid" id="malla"></div>

<script>

const malla = {

/* CICLO BÁSICO */

"1° Semestre":[
{id:"introEco", nombre:"Introducción a la Economía", creditos:6},
{id:"gestionEmp", nombre:"Gestión de Empresa", creditos:6},
{id:"programacion", nombre:"Programación para Analítica de Datos", creditos:6},
{id:"tecInfo", nombre:"Tecnología y Sistemas de Información", creditos:6},
{id:"mate1", nombre:"Métodos Matemáticos I", creditos:6},
{id:"comunicacion", nombre:"Comunicación", creditos:3}
],

"2° Semestre":[
{id:"microIntro", nombre:"Introducción a la Microeconomía", creditos:6, req:["introEco"]},
{id:"gestionPersonas", nombre:"Gestión de Personas", creditos:6, req:["gestionEmp"]},
{id:"contabilidad", nombre:"Contabilidad", creditos:6, req:["gestionEmp"]},
{id:"mate2", nombre:"Métodos Matemáticos II", creditos:6, req:["mate1"]},
{id:"ingles1", nombre:"Inglés I", creditos:3}
],

"3° Semestre":[
{id:"macroIntro", nombre:"Introducción a la Macroeconomía", creditos:6, req:["mate2","introEco"]},
{id:"marketing", nombre:"Marketing", creditos:6, req:["gestionEmp"]},
{id:"estad1", nombre:"Estadística I", creditos:6, req:["programacion","mate1"]},
{id:"mate3", nombre:"Métodos Matemáticos III", creditos:6, req:["mate2","gestionEmp"]},
{id:"ingles2", nombre:"Inglés II", creditos:3, req:["ingles1"]},
{id:"pensamiento", nombre:"Introducción al Pensamiento Económico y Político", creditos:3, req:["introEco"]}
],

"4° Semestre":[
{id:"ecoAplicada", nombre:"Economía Aplicada", creditos:6, req:["macroIntro","microIntro"]},
{id:"finanzas", nombre:"Finanzas", creditos:6, req:["contabilidad","mate2","estad1"]},
{id:"datos", nombre:"Razonamiento Basado en Datos", creditos:6, req:["programacion","tecInfo","estad1"]},
{id:"estad2", nombre:"Estadística II", creditos:6, req:["estad1","mate2"]},
{id:"mate4", nombre:"Métodos Matemáticos IV", creditos:6, req:["mate3"]},
{id:"ingles3", nombre:"Inglés III", creditos:3, req:["ingles2"]}
],

/* CICLO DISCIPLINAR */

"5° Semestre":[
{id:"metodosCuant1", nombre:"Métodos Cuantitativos I", creditos:6, req:["datos","estad2","mate4"]},
{id:"macro1", nombre:"Macroeconomía I", creditos:6, req:["macroIntro"]},
{id:"micro1", nombre:"Microeconomía I", creditos:6, req:["microIntro","ecoAplicada"]},
{id:"histEco", nombre:"Historia Económica", creditos:6, req:["macroIntro","microIntro"]},
{id:"ingles4", nombre:"Inglés IV", creditos:3, req:["ingles3"]},
{id:"com1", nombre:"Comunicación I", creditos:3, req:["comunicacion"]}
],

"6° Semestre":[
{id:"electivoNegocios", nombre:"Electivo Negocios para Economía", creditos:6},
{id:"metodosCuant2", nombre:"Métodos Cuantitativos II", creditos:6, req:["metodosCuant1"]},
{id:"macro2", nombre:"Macroeconomía II", creditos:6, req:["macro1"]},
{id:"micro2", nombre:"Microeconomía II", creditos:6, req:["micro1"]},
{id:"tallerPolitica", nombre:"Taller de Política Pública", creditos:6, req:["ecoAplicada","com1"]},
{id:"electivoSocial1", nombre:"Electivo Entorno Social I", creditos:3},
{id:"libre1", nombre:"Electivo Libre I", creditos:3}
],

"7° Semestre":[
{id:"tallerProf1", nombre:"Taller Práctico Profesional/Social I", creditos:6},
{id:"tallerProf2", nombre:"Taller Práctico Profesional/Social II", creditos:6},
{id:"macro3", nombre:"Macroeconomía III", creditos:6, req:["macro2"]},
{id:"micro3", nombre:"Microeconomía III", creditos:6, req:["micro2"]},
{id:"electivoSocial2", nombre:"Electivo Entorno Social II", creditos:3},
{id:"libre2", nombre:"Electivo Libre II", creditos:3}
],

"8° Semestre":[
{id:"prof1", nombre:"Electivo de Profundización I", creditos:6},
{id:"prof2", nombre:"Electivo de Profundización II", creditos:6},
{id:"prof3", nombre:"Electivo de Profundización III", creditos:6},
{id:"macro4", nombre:"Macroeconomía IV", creditos:6, req:["macro2","metodosCuant1","tallerPolitica"]},
{id:"micro4", nombre:"Microeconomía IV", creditos:6, req:["micro2","metodosCuant1","tallerPolitica"]},
{id:"libre3", nombre:"Electivo Libre III", creditos:3}
]

};

let aprobados = JSON.parse(localStorage.getItem("aprobados")) || [];

function nombre(id){
for(let s in malla)
for(let r of malla[s])
if(r.id===id) return r.nombre;
return id;
}

function progreso(){
let totalR=0;
let totalC=0;
let aprobC=0;

for(let s in malla){
malla[s].forEach(r=>{
totalR++;
totalC+=r.creditos;
if(aprobados.includes(r.id))
aprobC+=r.creditos;
});
}

document.getElementById("ramoTexto").innerText=
`Ramos aprobados: ${aprobados.length} / ${totalR}`;

document.getElementById("ramoBar").style.width=
(aprobados.length/totalR*100)+"%";

document.getElementById("creditTexto").innerText=
`Créditos aprobados: ${aprobC} / ${totalC}`;

document.getElementById("creditBar").style.width=
(aprobC/totalC*100)+"%";
}

function render(){
const cont=document.getElementById("malla");
cont.innerHTML="";

for(let sem in malla){
const col=document.createElement("div");
col.className="semestre";
col.innerHTML=`<h2>${sem}</h2>`;

malla[sem].forEach(r=>{
let faltan=r.req? r.req.filter(x=>!aprobados.includes(x)):[];
let bloqueado=faltan.length>0;

const div=document.createElement("div");
div.className="ramo";
if(bloqueado) div.classList.add("bloqueado");
if(aprobados.includes(r.id)) div.classList.add("aprobado");

div.innerHTML=
`${r.nombre} (${r.creditos} cr)
${r.req?`<div class="req">Req: ${r.req.map(nombre).join(", ")}</div>`:""}
${bloqueado?`<div class="req">❌ Falta: ${faltan.map(nombre).join(", ")}</div>`:""}`;

div.onclick=()=>{
if(bloqueado) return;

if(aprobados.includes(r.id))
aprobados=aprobados.filter(x=>x!==r.id);
else
aprobados.push(r.id);

localStorage.setItem("aprobados",JSON.stringify(aprobados));
render();
progreso();
};

col.appendChild(div);
});

cont.appendChild(col);
}
}

function resetear(){
if(confirm("¿Seguro quieres borrar el progreso?")){
localStorage.removeItem("aprobados");
aprobados=[];
render();
progreso();
}
}

render();
progreso();

</script>

</body>
</html>
